services:
  postgres:
    image: postgres:16-alpine
    container_name: belong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: belong
      POSTGRES_PASSWORD: belong
      POSTGRES_DB: belong
    ports:
      - "5433:5432"
    volumes:
      - belong_postgres_data:/var/lib/postgresql/data

volumes:
  belong_postgres_data:
